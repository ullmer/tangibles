# enoPrismsDetails config — ACM/TEI v02 (refactored for labeled bindings + bar roles)

# --------------------------------------------------------------------
# Global scalars and palettes (reusable anchors)
# --------------------------------------------------------------------
globals:
  pathMaxDy:   &pathMaxDy    750
  barYShift:   &barYShift   1090
  barNarrow1:  &barNarrow1    35
  barNarrow2:  &barNarrow2    88
  barWide:     &barWide      400

colors:
  cblu: &cblu [ 0,   0, 255, 75 ]
  cyel: &cyel [255, 255,   0, 70 ]
  cgre: &cgre [ 0, 255,   0, 70 ]
  cgr2: &cgr2 [ 0, 255,   0, 20 ]
  cred: &cred [255,   0,   0, 70 ]

# --------------------------------------------------------------------
# Summon map
# --------------------------------------------------------------------
summon_bindings:
  - { prism: teiLandscape, slot: 0, use: teiLandscape }
  - { prism: teiYearsQ4,   slot: 1, use: teiYearsQ4 }

# --------------------------------------------------------------------
# Background actors
# --------------------------------------------------------------------
background_bars:
  land: { image: "teiland04",     bottomleft: [ 0,   *barYShift ], name: "teiLandscape", scale: 0.45 }
  conf: { image: "teiblockconf04", bottomleft: [ 910, *barYShift ], name: "teiConfsQ04",  scale: 0.45 }

# --------------------------------------------------------------------
# Shared bindings (now all dictionaries)
# --------------------------------------------------------------------
shared:

  # ---------------- teiLandscape bindings ----------------
  teiLandscapeBindings: &teiLandscapeBindings
    - { year: 22, city: Daejeon,  color: *cyel, firstWidth: *barNarrow1 }
    - { year: 23, city: Warsaw,   color: *cblu, firstWidth: *barNarrow1 }
    - { year: 24, city: Cork,     color: *cblu, firstWidth: *barWide    }
    - { year: 25, city: Bordeaux, color: *cblu, firstWidth: *barNarrow1 }
    - { year: 26, city: Chicago,  color: *cred, firstWidth: *barNarrow1 }

  # ---------------- teiYearsQ4 A (greens + yellow) ----------------
  teiYearsQ4BindingsA: &teiYearsQ4BindingsA
    - { label: creativity,               color: *cgre, firstWidth: *barNarrow2 }
    - { label: dance+theater,            color: *cgre, firstWidth: *barNarrow2 }
    - { label: music+sound,              color: *cgre, firstWidth: *barNarrow2 }
    - { label: actuation,                color: *cyel, firstWidth: *barNarrow2 }
    - { label: artificial intelligence,  color: *cyel, firstWidth: *barNarrow2 }
    - { label: computing hardware,       color: *cyel, firstWidth: *barNarrow2 }

  # ---------------- teiYearsQ4 B (green‑fade then yellow) ----------------
  teiYearsQ4BindingsB: &teiYearsQ4BindingsB
    - { label: creativity,              color: *cgr2, firstWidth: *barNarrow2 }
    - { label: dance+theater,           color: *cgr2, firstWidth: *barNarrow2 }
    - { label: music+sound,             color: *cgr2, firstWidth: *barNarrow2 }
    - { label: actuation,               color: *cyel, firstWidth: *barNarrow2 }
    - { label: artificial intelligence, color: *cyel, firstWidth: *barNarrow2 }
    - { label: computing hardware,      color: *cyel, firstWidth: *barNarrow2 }

  # ---------------- Shared bar parameter anchors ----------------
  epb1a: &epb1a { flowLeft: false, textOffset2: [ -18, 0 ], fontSize: 25,
                  pathMaxDy: *pathMaxDy, pathMaxDx: 700, basePos: [200, 0] }

  epb1b: &epb1b { flowLeft: false, pathMaxDx: 140, pathMaxDy: 80, baseWidth: 79,
                  basePos: [900, *pathMaxDy], refractBars: true }

  epb2a: &epb2a { flowLeft: true, textOffset2: [930, 0], fontSize: 40,
                  pathMaxDy: *pathMaxDy, pathMaxDx: 1000 }

  epb2b: &epb2b { flowLeft: true, textOffset2: [705, 0], fontSize: 25,
                  pathMaxDy: 80, pathMaxDx: -100, basePos: [100, *pathMaxDy],
                  baseWidth: 105, refractBars: true }

  # ---------------- ParseGrid bindings ----------------
  teiLandscapeGrid: &teiLandscapeGrid
    [ tools, actuation, AI, "computing hardware",
      art, creativity, "dance&theater", "music&sound" ]

  teiYearsQ4Grid: &teiYearsQ4Grid
    [ tei22, tei23, tei24, tei25, tei26 ]

# --------------------------------------------------------------------
# Prism specifications (now using labeled bar roles)
# --------------------------------------------------------------------
prisms:

  # ---------------------- teiLandscape ----------------------
  teiLandscape:
    prismName: "teiLandscape"

    bars:
      upper:
        <<: *epb1a
        bindings_method: addBarL
        bindings: *teiLandscapeBindings

      lower:
        <<: *epb1b
        bindings_method: addBarL2
        bindings: *teiLandscapeBindings

    parseGrid:
      rows: 2
      cols: 4
      x0:  -10
      y0:  831
      pixDim: [413, 116]
      verbose: false
      gridBindings: *teiLandscapeGrid

  # ---------------------- teiYearsQ4 ----------------------
  teiYearsQ4:
    prismName: "teiYearsQ4"

    bars:
      upper:
        <<: *epb2a
        bindings_method: addBarL
        bindings: *teiYearsQ4BindingsA

      lower:
        <<: *epb2b
        set_attrs: { baseWidth: 97, baseShiftX: -260 }
        add_sequence:
          - { method: addBarL3, count: 3, args: [65] }
          - { method: addBarL2 }
        bindings: *teiYearsQ4BindingsB

    parseGrid:
      rows: 1
      cols: 5
      x0:  1040
      y0:  831
      pixDim: [398, 116]
      verbose: false
      gridBindings: *teiYearsQ4Grid

### end ###
